<svg xmlns="http://www.w3.org/2000/svg" width="460" height="120" viewBox="0 0 460 120" role="img" aria-label="Claunchpad — Project OS for Claude Code">
  <defs>
    <linearGradient id="cp-trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset=".5" stop-color="#5b8dee"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- self-contained dark panel so it reads the same on light or dark backgrounds -->
  <rect x="1" y="1" width="458" height="118" rx="22" fill="#0f1117" stroke="#252a38" stroke-width="2"/>

  <!-- launch mark: an upward arrow lifting off a pad -->
  <g transform="translate(40,22)">
    <path d="M32 2 L58 38 L41 38 L41 60 L23 60 L23 38 L6 38 Z" fill="url(#cp-trail)"/>
    <rect x="12" y="70" width="40" height="6" rx="3" fill="#5b8dee"/>
    <rect x="20" y="82" width="24" height="4" rx="2" fill="#5b8dee" opacity=".5"/>
  </g>

  <!-- wordmark -->
  <text x="120" y="58" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="42" font-weight="800" fill="#e8edf5" letter-spacing="-1">Claun<tspan fill="#5b8dee">ch</tspan>pad</text>
  <text x="122" y="86" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="500" fill="#8892a4" letter-spacing="2.5">PROJECT OS FOR CLAUDE CODE</text>
</svg>
